{% if messages %}
<div class="toast-container-custom">
    {% for message in messages %}
    <div class="toast align-items-center text-white border-0 glass-panel {% if message.tags == 'success' %}bg-success{% elif message.tags == 'error' %}bg-danger{% elif message.tags == 'warning' %}bg-warning{% else %}bg-primary{% endif %} mb-2 animate-fade-in" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body d-flex align-items-center gap-2">
                {% if message.tags == 'success' %}
                <i class="bi bi-check-circle-fill"></i>
                {% elif message.tags == 'error' %}
                <i class="bi bi-x-circle-fill"></i>
                {% elif message.tags == 'warning' %}
                <i class="bi bi-exclamation-triangle-fill"></i>
                {% else %}
                <i class="bi bi-info-circle-fill"></i>
                {% endif %}
                <span>{{ message }}</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
