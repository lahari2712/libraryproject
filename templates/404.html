{% extends 'base.html' %}
{% load static %}
{% block title %}Page Not Found | LibPortal{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center animate-fade-in" style="min-height: 60vh;">
    <div class="col-lg-6 col-md-8 text-center">
        <div class="glass-panel p-5">
            <h1 class="display-1 fw-bold text-primary mb-3" style="font-family: 'Outfit', sans-serif;">404</h1>
            <h3 class="fw-bold text-primary mb-2">Oops! Page Not Found</h3>
            <p class="text-secondary mb-4">The URL path you requested does not exist in our library portal database.</p>
            <a href="{% url 'home' %}" class="btn btn-primary-gradient px-4"><i class="bi bi-house-door-fill me-1"></i>Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
